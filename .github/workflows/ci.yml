name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  infrastructure:
    name: Infrastructure (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/infrastructure
    env:
      GOWORK: "off"
      # DB-backed tests connect here; setupTestDB only connects + DELETE-cleans, it does
      # NOT create the schema, so the migrate step below must run first (#43).
      LETTUCE_TEST_DB_URL: postgres://lettuce:lettuce@localhost:5432/lettuce_test?sslmode=disable
      # The database package's tests build their pool from the DISCRETE vars (not the URL),
      # and Password has no default — so set them explicitly to match the service above.
      LETTUCE_TEST_DB_HOST: localhost
      LETTUCE_TEST_DB_PORT: "5432"
      LETTUCE_TEST_DB_NAME: lettuce_test
      LETTUCE_TEST_DB_USER: lettuce
      LETTUCE_TEST_DB_PASSWORD: lettuce
      # Dev escape hatch so e2e tests that need a signer can autogenerate one.
      LETTUCE_SIGNING_KEY_AUTOGEN: "true"
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: lettuce
          POSTGRES_PASSWORD: lettuce
          POSTGRES_DB: lettuce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/infrastructure/go.mod
          cache-dependency-path: services/infrastructure/go.sum
      - run: go vet ./...
      # Apply the schema before the DB-backed tests run. There is no --migrate-only server
      # flag (migrations only run inside cmd/lettuce-server boot), so use the golang-migrate
      # CLI directly against the migrations directory.
      - name: Apply migrations
        run: go run -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@latest -source "file://migrations" -database "$LETTUCE_TEST_DB_URL" up
      # Run unit AND integration (-tags integration) tests. The integration suite is
      # DB-gated and was previously invisible in CI (no Postgres). -p 1 serializes PACKAGE
      # execution: every DB-backed package shares the one Postgres and setupTestDB does a
      # global DELETE-clean, so running package binaries in parallel makes them stomp each
      # other's rows (FK violations). -p 1 gives each package exclusive DB access in turn.
      # The e2e lifecycle packages (./internal and ./internal/e2e) are EXCLUDED here and run
      # in the non-blocking step below — they were rewritten for the per-copy dispatch model
      # but have only ever been compiled, so they still need a round of assertion fixups
      # (TODO #43/#45) and would otherwise block on pre-existing failures unrelated to a PR.
      - name: Integration tests (DB-backed)
        run: go test -tags integration -p 1 $(go list ./... | grep -vE '/infrastructure/internal$|/infrastructure/internal/e2e$')
      # The per-copy e2e lifecycle suites — RUN and reported, but non-blocking until their
      # assertion fixups land (TODO #43/#45). Flip to blocking once they are green.
      - name: E2E lifecycle tests (non-blocking until per-copy fixups land)
        continue-on-error: true
        run: go test -tags integration -p 1 ./internal/ ./internal/e2e/

  volunteer-cli:
    name: Volunteer CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/volunteer-cli
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version-file: services/volunteer-cli/go.mod
          cache-dependency-path: services/volunteer-cli/go.sum
      - run: go vet ./...
      # -p 1 serializes PACKAGE execution. `go test ./...` defaults -p to GOMAXPROCS, so it
      # runs several package test binaries at once; the heavy ones (internal/management,
      # internal/daemon) overlap and spike RSS, and the memory-tight GitHub runner OOMs with
      # `fatal error: runtime: cannot allocate memory` — surfacing in whichever binary is
      # mid-allocation (often the innocent internal/resource). -p 1 bounds peak memory to the
      # single heaviest package so the two heavy binaries never run concurrently; tests WITHIN
      # a package still parallelize. Cost: package times sum instead of overlapping (this job
      # ~6min vs ~4min before) — accepted for reliability, since -p 2 is insufficient (the two
      # heavy packages are exactly two and could still be co-scheduled). Fixes the flaky OOM (#36).
      - run: go test -p 1 ./...

  dashboard:
    name: Dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      - run: npm run build
