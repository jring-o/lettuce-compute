name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  infrastructure:
    name: Infrastructure (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/infrastructure
    env:
      GOWORK: "off"
      # DB-backed tests connect here; setupTestDB only connects + DELETE-cleans, it does
      # NOT create the schema, so the migrate step below must run first (#43).
      LETTUCE_TEST_DB_URL: postgres://lettuce:lettuce@localhost:5432/lettuce_test?sslmode=disable
      # The database package's tests build their pool from the DISCRETE vars (not the URL),
      # and Password has no default — so set them explicitly to match the service above.
      LETTUCE_TEST_DB_HOST: localhost
      LETTUCE_TEST_DB_PORT: "5432"
      LETTUCE_TEST_DB_NAME: lettuce_test
      LETTUCE_TEST_DB_USER: lettuce
      LETTUCE_TEST_DB_PASSWORD: lettuce
      # Dev escape hatch so e2e tests that need a signer can autogenerate one.
      LETTUCE_SIGNING_KEY_AUTOGEN: "true"
    services:
      postgres:
        # Pinned by digest (BG-31) like every image in this repo — a re-pointed
        # mutable tag must never silently change what CI tests against.
        image: postgres:16@sha256:33f923b05f64ca54ac4401c01126a6b92afe839a0aa0a52bc5aeb5cc958e5f20
        env:
          POSTGRES_USER: lettuce
          POSTGRES_PASSWORD: lettuce
          POSTGRES_DB: lettuce_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      # Actions are pinned by commit SHA (BG-31): a mutable tag (@vN) can be
      # re-pointed by a compromised action repo, and whatever it then runs
      # executes with this workflow's permissions. Update pins deliberately by
      # editing the SHA (the trailing comment names the release it came from).
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: services/infrastructure/go.mod
          cache-dependency-path: services/infrastructure/go.sum
      - run: go vet ./...
      # Apply the schema before the DB-backed tests run. There is no --migrate-only server
      # flag (migrations only run inside cmd/lettuce-server boot), so use the golang-migrate
      # CLI directly against the migrations directory. Pinned to the module version in
      # services/infrastructure/go.mod so CI migrates with the same engine the head embeds.
      - name: Apply migrations
        run: go run -tags 'postgres' github.com/golang-migrate/migrate/v4/cmd/migrate@v4.19.1 -source "file://migrations" -database "$LETTUCE_TEST_DB_URL" up
      # Run unit AND integration (-tags integration) tests. The integration suite is
      # DB-gated and was previously invisible in CI (no Postgres). -p 1 serializes PACKAGE
      # execution: every DB-backed package shares the one Postgres and setupTestDB does a
      # global DELETE-clean, so running package binaries in parallel makes them stomp each
      # other's rows (FK violations). -p 1 gives each package exclusive DB access in turn.
      # The e2e lifecycle packages (./internal and ./internal/e2e) are EXCLUDED here and run
      # in the non-blocking step below — they were rewritten for the per-copy dispatch model
      # but have only ever been compiled, so they still need a round of assertion fixups
      # (TODO #43/#45) and would otherwise block on pre-existing failures unrelated to a PR.
      - name: Integration tests (DB-backed)
        run: go test -tags integration -p 1 $(go list ./... | grep -vE '/infrastructure/internal$|/infrastructure/internal/e2e$')
      # The per-copy e2e lifecycle suites — RUN and reported, but non-blocking until their
      # assertion fixups land (TODO #43/#45). Flip to blocking once they are green.
      - name: E2E lifecycle tests (non-blocking until per-copy fixups land)
        continue-on-error: true
        run: go test -tags integration -p 1 ./internal/ ./internal/e2e/

  volunteer-cli:
    name: Volunteer CLI (Go)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/volunteer-cli
    env:
      GOWORK: "off"
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: services/volunteer-cli/go.mod
          cache-dependency-path: services/volunteer-cli/go.sum
      - run: go vet ./...
      # The flaky #36 OOM (`fatal error: runtime: cannot allocate memory`, surfacing in
      # internal/resource) was ROOT-CAUSED to a test that set RLIMIT_AS on the test process
      # ITSELF and never restored it — fixed in internal/resource/limiter_test.go. It crashed
      # even under -p 1 with no other package running, so cross-package parallelism was never
      # the real cause. -p 1 is kept only as cheap defense-in-depth on the memory-tight runner:
      # it serializes PACKAGE execution so the heavy binaries (internal/management ~214s,
      # internal/daemon ~75s) can't co-spike RSS. Cost ~2min (tests WITHIN a package still
      # parallelize); drop back to `go test ./...` if CI time matters more than the margin.
      - run: go test -p 1 ./...

  dashboard:
    name: Dashboard (Next.js)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/dashboard
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6.5.0
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: services/dashboard/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npm test
      # The dashboard must build with no reach to Google Fonts (PB-24): fonts
      # are vendored in src/app/fonts and loaded via next/font/local. Black-hole
      # the font hosts so any reintroduced build-time font fetch (e.g. an import
      # from next/font/google) fails this job instead of the next air-gapped
      # image build.
      - name: Block Google Fonts hosts (build must not fetch fonts)
        run: printf '127.0.0.1 fonts.googleapis.com\n127.0.0.1 fonts.gstatic.com\n' | sudo tee -a /etc/hosts
      - run: npm run build

  # Deploy-artifact validation (BG-31): before this job, a broken Dockerfile,
  # compose file, or Caddyfile was first discovered at deploy time, on the
  # production host. It builds BOTH runtime images exactly as the production
  # compose does, asserts they dropped root, and validates the production
  # compose file (with a stub .env) and the Caddyfile with the same pinned
  # Caddy image the deploy runs.
  deploy-validate:
    name: Deploy artifacts (images, compose, Caddyfile)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Build infrastructure image
        run: docker build -t lettuce-infrastructure:ci services/infrastructure
      - name: Build dashboard image (production target)
        run: docker build -t lettuce-dashboard:ci --target production services/dashboard
      # Build-context hygiene (PB-4): `COPY . .` must not ship host-generated
      # paths into the image — a host node_modules overwrites the `npm ci`
      # layer with wrong-platform binaries and makes the context copy
      # pathologically slow. Plant a sentinel where a host `npm install` would
      # put one and assert the built image does not contain it
      # (services/dashboard/.dockerignore keeps it out of the context).
      - name: Dashboard build-context hygiene (host node_modules stays out of the image)
        run: |
          mkdir -p services/dashboard/node_modules
          touch services/dashboard/node_modules/pb4-sentinel
          docker build -t lettuce-dashboard:ci-dev --target dev services/dashboard
          if docker run --rm --entrypoint sh lettuce-dashboard:ci-dev -c 'test -e /app/node_modules/pb4-sentinel'; then
            echo "FAIL: host node_modules leaked into the image (PB-4) — check services/dashboard/.dockerignore"
            exit 1
          fi
          echo "OK: sentinel excluded from the image"
      - name: Assert non-root runtime users (BG-31)
        run: |
          infra_user="$(docker inspect --format '{{.Config.User}}' lettuce-infrastructure:ci)"
          dash_user="$(docker inspect --format '{{.Config.User}}' lettuce-dashboard:ci)"
          echo "infrastructure runs as: '${infra_user}'  dashboard runs as: '${dash_user}'"
          [ "$infra_user" = "lettuce" ] || { echo "FAIL: infrastructure image must run as the non-root 'lettuce' user (uid 10001)"; exit 1; }
          [ "$dash_user" = "node" ] || { echo "FAIL: dashboard image must run as the non-root 'node' user (uid 1000)"; exit 1; }
      - name: Validate compose.production.yaml (stub .env)
        run: |
          cat > .env <<'EOF'
          POSTGRES_PASSWORD=ci-stub
          REDIS_PASSWORD=ci-stub
          LETTUCE_ADMIN_API_KEY=ci-stub
          DASHBOARD_API_KEY=ci-stub
          NEXTAUTH_SECRET=ci-stub
          LETTUCE_HEAD_NAME=ci-stub
          PLATFORM_URL=https://ci.example.com
          REGISTRY_PASS_HASH=ci-stub
          LETTUCE_ARTIFACT_RETENTION=last:2
          LETTUCE_HEAD_RELIABILITY_QUOTA_ENABLED=false
          LETTUCE_HEAD_RELIABILITY_QUOTA_FLOOR=7
          VIZ_BUNDLE_ALLOWED_ORIGINS=https://cdn.ci.example.com
          EOF
          docker compose -f compose.production.yaml config -q
      # Every knob documented in .env.example must actually reach the container
      # environment of the service whose code reads it — a knob the compose
      # file does not pass through is a silent no-op for the operator who sets
      # it in .env. Asserted against the rendered config with the stub .env
      # values above.
      - name: Assert documented .env knobs reach container environments
        run: |
          docker compose -f compose.production.yaml config --format json > /tmp/rendered.json
          jq -e '.services.infrastructure.environment.LETTUCE_ARTIFACT_RETENTION == "last:2"' /tmp/rendered.json >/dev/null \
            || { echo "FAIL: LETTUCE_ARTIFACT_RETENTION from .env does not reach the infrastructure container"; exit 1; }
          jq -e '.services.infrastructure.environment.LETTUCE_HEAD_RELIABILITY_QUOTA_ENABLED == "false"' /tmp/rendered.json >/dev/null \
            || { echo "FAIL: LETTUCE_HEAD_RELIABILITY_QUOTA_ENABLED from .env does not reach the infrastructure container"; exit 1; }
          jq -e '.services.infrastructure.environment.LETTUCE_HEAD_RELIABILITY_QUOTA_FLOOR == "7"' /tmp/rendered.json >/dev/null \
            || { echo "FAIL: LETTUCE_HEAD_RELIABILITY_QUOTA_FLOOR from .env does not reach the infrastructure container"; exit 1; }
          jq -e '.services.dashboard.environment.VIZ_BUNDLE_ALLOWED_ORIGINS == "https://cdn.ci.example.com"' /tmp/rendered.json >/dev/null \
            || { echo "FAIL: VIZ_BUNDLE_ALLOWED_ORIGINS from .env does not reach the dashboard container"; exit 1; }
          echo "OK: all documented knobs render into their services' environments"
      # The dev stack's dashboard key must reach BOTH services: the dashboard
      # sends it, and the head's bootstrap provisions it at boot — with it on
      # only one side, every authed dashboard page (including the public leaf
      # pages) fails with "invalid API key" on the documented dev stack.
      - name: Assert dev compose gives the head the dashboard key
        run: |
          docker compose -f compose.yaml config --format json > /tmp/dev-rendered.json
          jq -e '.services.infrastructure.environment.DASHBOARD_API_KEY != null' /tmp/dev-rendered.json >/dev/null \
            || { echo "FAIL: dev compose does not pass DASHBOARD_API_KEY to the infrastructure service"; exit 1; }
          jq -e '.services.infrastructure.environment.DASHBOARD_API_KEY == .services.dashboard.environment.DASHBOARD_API_KEY' /tmp/dev-rendered.json >/dev/null \
            || { echo "FAIL: infrastructure and dashboard disagree on DASHBOARD_API_KEY in the dev compose"; exit 1; }
          echo "OK: dev compose passes the dashboard key to both services"
      - name: Validate Caddyfile
        # Runs `caddy validate` in the SAME digest-pinned image the production
        # compose deploys. The env placeholders ({$REGISTRY_USER} etc.) resolve
        # at load time, so supply stand-ins (the hash is Caddy's documented
        # example bcrypt output, not a real credential). Beyond validity, the
        # step fails on any deprecation warning: a deprecated directive still
        # validates today but is removed in a future Caddy major, and the only
        # signal is a WARN in the boot log that production operators never read.
        run: |
          out="$(docker run --rm \
            -v "$PWD/Caddyfile:/etc/caddy/Caddyfile:ro" \
            -e REGISTRY_USER=ci-stub \
            -e 'REGISTRY_PASS_HASH=$2a$14$Zkx19XLiW6VYouLHR5NmfOFU0z2GTNmpkT/5qqR7hx4IjWJPDhjvG' \
            caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648 \
            caddy validate --config /etc/caddy/Caddyfile --adapter caddyfile 2>&1)" || { echo "$out"; exit 1; }
          echo "$out"
          if echo "$out" | grep -qi 'deprecat'; then
            echo "FAIL: Caddyfile triggers a deprecation warning (see output above)"
            exit 1
          fi
      # Behavioral contract of the shipped proxy config, checked against a LIVE
      # Caddy (same digest-pinned image) fronting stub upstreams. Static
      # validation cannot catch these: the registry version-check ping must
      # answer an anonymous GET /v2/ with a 401 Basic challenge (docker/podman/
      # skopeo only attach credentials after seeing one — a 200-no-challenge
      # ping makes every push fail "authentication required" with correct
      # creds), pulls must stay anonymous, and routes where the head enforces
      # a small body cap must get a 413 AT THE PROXY (an oversized body that
      # reaches the head instead resets the connection: the client sees 502
      # and passive health ejects the replica for 30s).
      - name: Proxy contract smoke (registry auth challenge, per-route body caps)
        run: |
          set -eu
          CADDY_IMG='caddy:2-alpine@sha256:5f5c8640aae01df9654968d946d8f1a56c497f1dd5c5cda4cf95ab7c14d58648'
          PY_IMG='python:3.12-slim@sha256:57cd7c3a7a273101a6485ba99423ee568157882804b1124b4dd04266317710de'
          # The same site-address transform an operator applies (domain -> local
          # hostname); routing, matchers, and caps are untouched.
          sed -e 's|^your-domain.com {|http://localhost {|' \
              -e 's|^viz.your-domain.com {|http://viz.localhost {|' \
              -e '/# HTTP to HTTPS redirect/,$d' Caddyfile > /tmp/Caddyfile.ci
          # The infrastructure stub must DRAIN request bodies like the real head
          # does: Caddy enforces request_body caps while streaming, so against a
          # stub that answers without reading, an early 200 can beat the cap trip
          # and mask a missing cap.
          cat > /tmp/stub.py <<'PYEOF'
          from http.server import BaseHTTPRequestHandler, HTTPServer
          class H(BaseHTTPRequestHandler):
              protocol_version = "HTTP/1.1"
              def _serve(self):
                  n = int(self.headers.get("Content-Length") or 0)
                  while n > 0:
                      chunk = self.rfile.read(min(n, 1 << 20))
                      if not chunk:
                          break
                      n -= len(chunk)
                  body = b"stub-infrastructure"
                  self.send_response(200)
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)
              def log_message(self, *a):
                  pass
              do_GET = do_POST = do_PUT = do_DELETE = do_HEAD = _serve
          HTTPServer(("0.0.0.0", 8080), H).serve_forever()
          PYEOF
          docker network create proxysmoke
          docker run -d --rm --network proxysmoke --name infrastructure -v /tmp/stub.py:/stub.py:ro "$PY_IMG" python /stub.py
          docker run -d --rm --network proxysmoke --name registry "$CADDY_IMG" caddy respond --listen :5000 "stub-registry"
          docker run -d --rm --network proxysmoke --name dashboard "$CADDY_IMG" caddy respond --listen :3000 "stub-dashboard"
          HASH="$(docker run --rm "$CADDY_IMG" caddy hash-password --plaintext ci-registry-pw)"
          docker run -d --rm --network proxysmoke --name proxy -p 127.0.0.1:8088:80 \
            -v /tmp/Caddyfile.ci:/etc/caddy/Caddyfile:ro \
            -e REGISTRY_USER=ci-user -e "REGISTRY_PASS_HASH=$HASH" "$CADDY_IMG"
          for i in $(seq 1 40); do
            curl -s -o /dev/null http://localhost:8088/ && break
            [ "$i" = 40 ] && { echo "FAIL: proxy never became ready"; docker logs proxy; exit 1; }
            sleep 0.5
          done
          assert_code() {
            want="$1"; shift
            got="$(curl -s -o /dev/null -w '%{http_code}' -m 120 "$@" || true)"
            [ "$got" = "$want" ] || { echo "FAIL: expected $want, got $got for: $*"; docker logs proxy; exit 1; }
            echo "OK $want <- $*"
          }
          # Registry auth handshake (PB-22)
          assert_code 401 http://localhost:8088/v2/
          curl -s -o /dev/null -D /tmp/ping-headers http://localhost:8088/v2/
          grep -qi '^www-authenticate: *basic' /tmp/ping-headers \
            || { echo "FAIL: anonymous GET /v2/ carries no Basic challenge"; cat /tmp/ping-headers; exit 1; }
          echo "OK Basic challenge on anonymous /v2/ ping"
          assert_code 200 -u ci-user:ci-registry-pw http://localhost:8088/v2/
          assert_code 401 -u ci-user:wrong-password http://localhost:8088/v2/
          assert_code 200 http://localhost:8088/v2/nbody/manifests/1.0
          assert_code 401 -X POST http://localhost:8088/v2/nbody/blobs/uploads/
          assert_code 200 -u ci-user:ci-registry-pw -X POST http://localhost:8088/v2/nbody/blobs/uploads/
          # Per-route body caps (PB-20): every oversized declared body must get
          # a 413 at the proxy, and each 413 must leave the upstream in
          # rotation — the health probe after each one catches an ejection at
          # the exact request that caused it.
          head -c 2048     /dev/zero > /tmp/b2k
          head -c 70000    /dev/zero > /tmp/b70k
          head -c 11000000 /dev/zero > /tmp/b11m
          head -c 68000000 /dev/zero > /tmp/b65m
          assert_code 413 -X POST --data-binary @/tmp/b2k  http://localhost:8088/api/v1/attestations/verify
          assert_code 200 http://localhost:8088/api/v1/health
          assert_code 413 -X POST --data-binary @/tmp/b70k http://localhost:8088/api/v1/volunteers/register
          assert_code 200 http://localhost:8088/api/v1/health
          assert_code 413 -X POST --data-binary @/tmp/b70k http://localhost:8088/api/v1/volunteers/register-challenge
          assert_code 200 http://localhost:8088/api/v1/health
          assert_code 413 -X POST --data-binary @/tmp/b11m http://localhost:8088/api/v1/volunteers/submit-result
          assert_code 200 http://localhost:8088/api/v1/health
          assert_code 413 -X POST --data-binary @/tmp/b65m http://localhost:8088/api/v1/leafs/x/work-units/bulk
          assert_code 200 http://localhost:8088/api/v1/health
          # ...while in-cap bodies still reach the backend
          head -c 512 /dev/zero > /tmp/b512
          assert_code 200 -X POST --data-binary @/tmp/b512 http://localhost:8088/api/v1/attestations/verify
          assert_code 200 -X POST --data-binary @/tmp/b2k  http://localhost:8088/api/v1/leafs/x/work-units/bulk
          docker rm -f proxy infrastructure registry dashboard >/dev/null 2>&1 || true
          docker network rm proxysmoke >/dev/null 2>&1 || true
      - name: Makefile guardrails (BG-35)
        run: |
          bad=$(grep -n 'docker compose' Makefile | grep -vE '^[0-9]+:\s*#' | grep -v -- '-f compose.yaml -p lettuce-dev' || true)
          if [ -n "$bad" ]; then echo "FAIL: repo-root Makefile invokes docker compose without '-f compose.yaml -p lettuce-dev' (BG-35):"; echo "$bad"; exit 1; fi
          if grep -n '@latest' services/infrastructure/Makefile; then echo "FAIL: services/infrastructure/Makefile must pin the migrate CLI (no @latest)"; exit 1; fi
