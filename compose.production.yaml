services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: lettuce
      POSTGRES_USER: lettuce
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U lettuce -d lettuce"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Shared store for horizontal scale-out (Layer 3). Backs the cross-replica
  # anti-replay dedup (a signature accepted by one replica is rejected by all)
  # and the cross-replica rate-limit buckets. REQUIRED when HEAD_REPLICAS > 1.
  # With a single replica the head ignores LETTUCE_REDIS_URL only if it is
  # empty; here it is always wired, which is harmless for one replica and means
  # scaling up is a one-number change. No host port is published — only the
  # infrastructure replicas on this private network reach it.
  redis:
    image: docker.io/library/redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--save", "", "--appendonly", "no"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  infrastructure:
    build:
      context: ./services/infrastructure
      dockerfile: Dockerfile
      args:
        # Stamp the binary's version. Supply at build time from the checked-out
        # tag, e.g. `LETTUCE_VERSION=$(git describe --tags) docker compose build
        # infrastructure`. Falls back to "dev" if unset (.git is outside the
        # build context, so git can't run inside the container).
        VERSION: ${LETTUCE_VERSION:-dev}
    init: true
    restart: unless-stopped
    # Horizontal scale-out: the head is stateless behind Caddy, so the replica
    # count is one number. Set HEAD_REPLICAS in .env (default 1). Each replica
    # auto-generates a distinct LETTUCE_HEAD_INSTANCE_ID at boot (do NOT pin one
    # — a shared id would collide dispatch-claim ownership), claims the units it
    # stages (claim-on-refill), shares the replay/rate-limit store via redis, and
    # contends for an advisory-lock leadership that runs the singleton background
    # jobs on exactly one replica. Concurrent migration on N-replica boot is safe
    # (golang-migrate takes an internal advisory lock). Infra publishes NO host
    # ports — only Caddy (on this private network) reaches it — so >1 replica can
    # coexist without host-port conflicts.
    #
    # SCALING: pass `--scale infrastructure=N` on the compose `up` command. NOTE:
    # podman-compose IGNORES the `deploy.replicas` key below (verified v1.6.0) and
    # runs ONE replica regardless of HEAD_REPLICAS — on podman you MUST use --scale.
    # Docker Compose v2 honors deploy.replicas/HEAD_REPLICAS; --scale works on both.
    deploy:
      replicas: ${HEAD_REPLICAS:-1}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      LETTUCE_DB_HOST: postgres
      LETTUCE_DB_PORT: "5432"
      LETTUCE_DB_DATABASE: lettuce
      LETTUCE_DB_USER: lettuce
      LETTUCE_DB_PASSWORD: ${POSTGRES_PASSWORD}
      LETTUCE_DB_SSL_MODE: disable
      LETTUCE_SERVER_HTTP_ADDR: ":8080"
      LETTUCE_SERVER_GRPC_ADDR: ":9090"
      LETTUCE_LOG_LEVEL: info
      LETTUCE_LOG_FORMAT: json
      LETTUCE_SIGNING_PRIVATE_KEY_PATH: /keys/signing.key
      LETTUCE_ADMIN_API_KEY: ${LETTUCE_ADMIN_API_KEY}
      LETTUCE_ADMIN_EMAIL: ${LETTUCE_ADMIN_EMAIL:-}
      LETTUCE_ADMIN_PASSWORD: ${LETTUCE_ADMIN_PASSWORD:-}
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY:-}
      LETTUCE_HEAD_NAME: ${LETTUCE_HEAD_NAME}
      LETTUCE_HEAD_DESCRIPTION: ${LETTUCE_HEAD_DESCRIPTION:-}
      LETTUCE_HEAD_URL: ${PLATFORM_URL}
      LETTUCE_CORS_ORIGINS: ${LETTUCE_CORS_ORIGINS:-}
      # --- Horizontal scale-out (Layer 3) ---
      # Shared store for the cross-replica replay dedup + rate-limit buckets.
      # Always wired; with one replica it is harmless. REQUIRED when
      # HEAD_REPLICAS > 1 (without it each replica keeps a private in-process
      # replay cache and per-process rate-limit buckets, so a replayed signature
      # passes a second replica and each client gets N× its rate budget).
      LETTUCE_REDIS_URL: redis://redis:6379
      # What to do when the shared replay store errors (e.g. a redis outage):
      # "open" (default) admits the request with a loud alarm so a redis blip
      # never takes the whole fleet offline or drops completed compute on
      # SubmitResult; "closed" rejects it (stricter replay protection). Flip to
      # closed only if you run adversarial workloads.
      LETTUCE_REPLAY_FAIL_MODE: ${LETTUCE_REPLAY_FAIL_MODE:-}
      # Per-head dispatch-claim lease (seconds). Optional; default 120. A held
      # unit's claim is renewed every flush tick, so this is a backstop for a
      # crashed/wedged replica, not the steady-state lifetime.
      LETTUCE_HEAD_CLAIM_LEASE_SECONDS: ${LETTUCE_HEAD_CLAIM_LEASE_SECONDS:-}
      # Do NOT set LETTUCE_HEAD_INSTANCE_ID here — each replica must auto-generate
      # a unique UUID at boot. A pinned shared value would collide claim ownership
      # across replicas.
      # Trust the X-Forwarded-For / X-Real-IP headers that Caddy adds, so the
      # infrastructure server can rate-limit and audit-log by the REAL client IP
      # instead of Caddy's container IP. Infra publishes no host ports — only
      # Caddy (on this private Docker network) can reach it — so trusting the
      # Docker/RFC1918 bridge ranges is safe and lets per-client limiting work.
      # If you override this, set it to the CIDR your reverse proxy connects from.
      LETTUCE_TRUSTED_PROXIES: ${LETTUCE_TRUSTED_PROXIES:-172.16.0.0/12,10.0.0.0/8,192.168.0.0/16}
      # --- Layer 1 dispatch tuning (v0.2.0) ---
      # All OPTIONAL: leave the matching variable unset in .env and the head uses
      # its built-in default (the loader ignores empty values). Forwarded here so
      # they are settable from .env without editing this file. Full table +
      # defaults: guides/head-setup.md. The one worth calibrating is
      # TARGET_REQUEST_RATE_PER_SEC — measure your single-head ceiling with
      # swarm-sim (the 2026-06 reference run measured ~240/sec) and set it; the
      # built-in 500 default is intentionally high.
      LETTUCE_HEAD_TARGET_REQUEST_RATE_PER_SEC: ${LETTUCE_HEAD_TARGET_REQUEST_RATE_PER_SEC:-}
      LETTUCE_HEAD_MAX_BATCH_PER_REQUEST: ${LETTUCE_HEAD_MAX_BATCH_PER_REQUEST:-}
      LETTUCE_HEAD_MIN_RETRY_DELAY_SECONDS: ${LETTUCE_HEAD_MIN_RETRY_DELAY_SECONDS:-}
      LETTUCE_HEAD_MAX_RETRY_DELAY_SECONDS: ${LETTUCE_HEAD_MAX_RETRY_DELAY_SECONDS:-}
      LETTUCE_HEAD_RETRY_DELAY_JITTER_PCT: ${LETTUCE_HEAD_RETRY_DELAY_JITTER_PCT:-}
      LETTUCE_HEAD_LEASE_SECONDS: ${LETTUCE_HEAD_LEASE_SECONDS:-}
      LETTUCE_HEAD_MAX_INFLIGHT_PER_VOLUNTEER: ${LETTUCE_HEAD_MAX_INFLIGHT_PER_VOLUNTEER:-}
    volumes:
      - ./keys:/keys:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/api/v1/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  dashboard:
    build:
      context: ./services/dashboard
      dockerfile: Dockerfile
      target: production
    init: true
    restart: unless-stopped
    depends_on:
      infrastructure:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: "5432"
      DB_NAME: lettuce
      DB_USER: lettuce
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      INFRASTRUCTURE_API_URL: http://infrastructure:8080
      # Dashboard service API key — create via Settings > API Keys, then set here.
      DASHBOARD_API_KEY: ${DASHBOARD_API_KEY}
      PLATFORM_URL: ${PLATFORM_URL}
      NEXTAUTH_URL: ${PLATFORM_URL}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      AUTH_TRUST_HOST: "true"
      VIZ_ORIGIN: ${VIZ_ORIGIN:-}
      NODE_ENV: production
      # Docker auto-sets HOSTNAME to the container id, which makes the Next.js
      # standalone server bind to that hostname instead of all interfaces.
      # Force 0.0.0.0 so the loopback healthcheck below can reach it.
      HOSTNAME: "0.0.0.0"
    volumes:
      - dashboard_data:/app/data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 15s

  registry:
    image: registry:2
    restart: unless-stopped
    volumes:
      - registry_data:/var/lib/registry

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    depends_on:
      - dashboard
      - infrastructure
      - registry
    environment:
      REGISTRY_USER: ${REGISTRY_USER:-lettuce}
      REGISTRY_PASS_HASH: ${REGISTRY_PASS_HASH}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./binaries:/srv/binaries:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  postgres_data:
  dashboard_data:
  registry_data:
  caddy_data:
  caddy_config:
